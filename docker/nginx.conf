# =============================================================================
# Nginx Configuration for WebSocket Game Server
#
# Key design decisions:
#
# 1. ip_hash for upstream — sticky sessions so WebSocket reconnections
#    hit the same backend. Without this, a reconnecting player might
#    land on a different instance and lose their WS context.
#
# 2. WebSocket upgrade handling — the proxy_set_header Upgrade and
#    Connection headers are required for the HTTP→WS upgrade handshake.
#
# 3. Long timeouts — WebSocket connections are long-lived. Default nginx
#    timeouts (60s) would kill idle connections. We set 3600s (1 hour).
#
# 4. proxy_buffering off — WebSocket messages should be forwarded
#    immediately, not buffered. Buffering adds latency.
# =============================================================================

worker_processes auto;
events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # ── Upstream (game server instances) ─────────────────────────────
    upstream game_backend {
        # ip_hash ensures the same client IP always hits the same backend.
        # Critical for WebSocket connection affinity.
        ip_hash;

        # Docker Compose DNS resolves "game-server" to all replicas.
        # Nginx discovers them via the resolver directive.
        server game-server:8000;
    }

    # Docker DNS resolver (required for dynamic upstreams)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Logging ──────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Performance ──────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;      # Critical for low-latency WebSocket
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Security Headers ─────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Rate Limiting (defense in depth — app also rate-limits) ──────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    server {
        listen 80;
        server_name _;

        # ── Health Check (no rate limit) ─────────────────────────────
        location /api/health {
            proxy_pass http://game_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── REST API ─────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://game_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket ────────────────────────────────────────────────
        location /ws {
            # Limit concurrent WS connections per IP
            limit_conn ws_conn 10;

            proxy_pass http://game_backend;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long timeouts for persistent WS connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;

            # No buffering for real-time messages
            proxy_buffering off;
        }

        # ── Docs (dev only — disabled in prod via FastAPI config) ────
        location /docs {
            proxy_pass http://game_backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://game_backend;
            proxy_set_header Host $host;
        }

        # ── Default static frontend ──────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
